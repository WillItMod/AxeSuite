services:
  init:
    image: alpine:3.20
    entrypoint: ["/bin/sh", "/standalone/init.sh"]
    environment:
      RPC_USER: bch
      RPC_PASSWORD: ${APP_PASSWORD:-changeme}
      BCH_P2P_PORT: 28333
      BCH_RPC_PORT: 28332
      BCH_ZMQ_HASHBLOCK_PORT: 28334
      PAYOUT_ADDRESS: ${PAYOUT_ADDRESS:-CHANGEME_BCH_PAYOUT_ADDRESS}
    volumes:
      - ./data:/data
      - ./standalone:/standalone:ro

  bchn:
    image: mainnet/bitcoin-cash-node:v28.0.1
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "28333:28333/tcp" # P2P
    volumes:
      - ./data/node:/data
      - ./standalone/bchn-entrypoint.sh:/bchn-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/bchn-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  ckpool:
    image: ghcr.io/getumbrel/docker-ckpool-solo:590fb2a
    command: "-k -B -L -c /config/ckpool.conf"
    user: "1000:1000"
    depends_on:
      - bchn
    restart: unless-stopped
    ports:
      - "4567:3333/tcp" # Stratum v1
    volumes:
      - ./data/pool/config:/config:ro
      - ./data/pool/www:/www

  axebch-app:
    image: ghcr.io/willitmod/axebch-app-umbrel-dev:0.7.91
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      - bchn
      - ckpool
    ports:
      - "21212:3000" # UI/API
    volumes:
      - ./data:/data
    environment:
      BCH_RPC_HOST: bchn
      BCH_RPC_PORT: 28332
      BCH_RPC_USER: bch
      BCH_RPC_PASS: ${APP_PASSWORD:-changeme}
      CKPOOL_STATUS_DIR: /data/pool/www/pool
      APP_CHANNEL: DOCKER
      BCHN_IMAGE: mainnet/bitcoin-cash-node:v28.0.1
      CKPOOL_IMAGE: ghcr.io/getumbrel/docker-ckpool-solo:590fb2a
      STATIC_DIR: /app/static

